# Loader Test — simple .mat file with EMG data
# Typical format: single variable containing (channels × samples) or (samples × channels)

name: "Loader Test"
format: mat

fields:
  emg:
    path: "emg"                    # .mat variable name
    fallback_keys: ["data", "sig", "signal"]  # try these if primary missing
    channels: null                 # null = all channels
    orientation: auto              # auto-detect from shape
  force:
    path: "force"
    fallback_keys: ["aux", "torque"]
    channels: null
    orientation: auto
  timestamps:
    path: "timestamps"
    fallback_keys: ["t", "time"]